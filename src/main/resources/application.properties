# =========================================================
# Sistema de Gestion de Vacunacion - SENA CIMM
# Configuracion completa de Spring Boot
# =========================================================

# -- Servidor --
spring.application.name=vacunacion-spring
server.port=8080

# -- Base de datos MySQL --
spring.datasource.url=jdbc:mysql://localhost:3306/vacunacion_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -- JPA / Hibernate --
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# -- Thymeleaf --
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# -- Internacionalizacion --
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# -- Logging --
logging.level.co.sena.cimm.adso=DEBUG
logging.level.org.hibernate.SQL=DEBUG
