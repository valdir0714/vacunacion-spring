<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Navbar compartido -->
<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand text-success fw-bold" th:href="@{/}">
            Vacunacion SENA
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:text="#{general.inicio}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/pacientes}" th:text="#{pacientes.titulo}">Pacientes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/vacunas}" th:text="#{vacunas.titulo}">Vacunas</a>
                </li>
                <li class="nav-item dropdown ms-2">
                    <a class="nav-link dropdown-toggle" href="#"
                       data-bs-toggle="dropdown" th:text="#{general.idioma}">Idioma</a>
                    <ul class="dropdown-menu dropdown-menu-end shadow-md border-0">
                        <li>
                            <a class="dropdown-item" th:href="@{/(lang=es)}">
                                Espanol
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/(lang=en)}">
                                English
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Bootstrap JS (necesario para dropdowns y toggles) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
