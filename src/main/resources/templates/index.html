<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{app.titulo}">Sistema de Vacunacion - SENA CIMM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link th:href="@{/css/vacunacion.css}" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-lg text-center border-0">
                <div class="card-body py-5">
                    <h1 class="text-success mb-3 fw-bold" th:text="#{app.titulo}">Sistema de Gestion de Vacunacion</h1>
                    <p class="lead text-muted mb-2" th:text="#{app.subtitulo}">SENA - Centro Industrial de Mantenimiento y Manufactura (CIMM)</p>
                    <p class="text-muted small mb-4" th:text="#{app.descripcion}">Tecnologo en Analisis y Desarrollo de Software - ADSO</p>
                    <hr class="my-4 text-muted">
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <a th:href="@{/pacientes}" class="btn btn-success btn-lg px-4" th:text="#{general.gestionarPacientes}">
                            Gestionar Pacientes
                        </a>
                        <a th:href="@{/vacunas}" class="btn btn-primary btn-lg px-4" th:text="#{general.gestionarVacunas}">
                            Gestionar Vacunas
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
