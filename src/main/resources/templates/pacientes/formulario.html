<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Paciente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link th:href="@{/css/vacunacion.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="container mt-4">
    <div class="card shadow-md border-0" style="max-width:600px;margin:auto;">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0" th:text="${paciente.id != null} ? #{pacientes.editar} : #{pacientes.nuevo}"></h4>
        </div>
        <div class="card-body">
            <form th:action="${paciente.id != null}
                    ? @{/pacientes/{id}(id=${paciente.id})}
                    : @{/pacientes}"
                  th:object="${paciente}"
                  method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="#{pacientes.nombre}">Nombres</label>
                    <input type="text" th:field="*{nombres}"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{pacientes.apellidos}">Apellidos</label>
                    <input type="text" th:field="*{apellidos}"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{pacientes.documento}">Numero de Documento</label>
                    <input type="text" th:field="*{documento}"
                           class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" th:text="#{pacientes.fechaNacimiento}">Fecha de Nacimiento</label>
                    <input type="date" th:field="*{fechaNacimiento}"
                           class="form-control" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success flex-grow-1" th:text="#{pacientes.guardar}">Guardar</button>
                    <a th:href="@{/pacientes}" class="btn btn-outline-secondary" th:text="#{pacientes.cancelar}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
