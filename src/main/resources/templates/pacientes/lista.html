<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{pacientes.titulo}">Pacientes - Sistema de Vacunacion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link th:href="@{/css/vacunacion.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="container mt-4">
    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-success fw-bold mb-0" th:text="#{pacientes.titulo}">Pacientes</h2>
        <a th:href="@{/pacientes/nuevo}" class="btn btn-success" th:text="#{pacientes.nuevo}">
            + Nuevo Paciente
        </a>
    </div>

    <!-- Mensaje de exito -->
    <div th:if="${mensaje}" class="alert alert-success mb-4" th:text="${mensaje}"></div>

    <!-- Tabla de pacientes -->
    <div class="card shadow-md border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th th:text="#{pacientes.nombreCompleto}">Nombre Completo</th>
                    <th th:text="#{pacientes.documento}">Documento</th>
                    <th th:text="#{pacientes.fechaNacimiento}">Fecha Nacimiento</th>
                    <th th:text="#{pacientes.acciones}">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="paciente : ${pacientes}">
                    <td th:text="${paciente.id}" class="text-muted"></td>
                    <td th:text="${paciente.nombreCompleto}" class="fw-medium"></td>
                    <td th:text="${paciente.documento}"></td>
                    <td th:text="${paciente.fechaNacimiento}"></td>
                    <td>
                        <a th:href="@{/pacientes/{id}/editar(id=${paciente.id})}"
                           class="btn btn-sm btn-primary me-1" th:text="#{general.editar}">Editar</a>
                        <a th:href="@{/pacientes/{id}/eliminar(id=${paciente.id})}"
                           class="btn btn-sm btn-danger" th:text="#{general.eliminar}"
                           onclick="return confirm('Eliminar paciente?')">
                            Eliminar
                        </a>
                    </td>
                </tr>
                <!-- Mensaje cuando no hay pacientes -->
                <tr th:if="${#lists.isEmpty(pacientes)}">
                    <td colspan="5" class="text-center text-muted py-4" th:text="#{pacientes.noHay}">
                        No hay pacientes registrados
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
