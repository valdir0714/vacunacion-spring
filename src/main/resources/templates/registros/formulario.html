<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Registro de Vacunaci�n</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/vacunacion.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: nav}"></div>

    <div class="container mt-4">
        <div class="card shadow-sm" style="max-width:700px;margin:auto;">
            <div class="card-header bg-sena text-white">
                <h4 th:text="${registro.id != null} ? 'Editar Registro' : 'Nuevo Registro de Vacunaci�n'"></h4>
            </div>
            <div class="card-body">
                <form th:action="${registro.id != null} ? @{/registros/{id}(id=${registro.id})} : @{/registros}"
                      th:object="${registro}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Paciente</label>
                        <select th:field="*{paciente}" class="form-select" required>
                            <option th:each="p : ${pacientes}" th:value="${p}" th:text="${p.nombreCompleto} + ' - ' + ${p.documento}"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Vacuna</label>
                        <select th:field="*{vacuna}" class="form-select" required>
                            <option th:each="v : ${vacunas}" th:value="${v}" th:text="${v.nombre} + ' (' + ${v.lote} + ')'"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha de Vacunaci�n</label>
                        <input type="datetime-local" th:field="*{fechaVacunacion}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Personal M�dico</label>
                        <select th:field="*{personalMedico}" class="form-select" required>
                            <option th:each="u : ${personalMedico}" th:value="${u}" th:text="${u.nombreCompleto} + ' (' + ${u.rol} + ')'"></option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Lugar de Vacunaci�n</label>
                        <input type="text" th:field="*{lugarVacunacion}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Observaciones</label>
                        <textarea th:field="*{observaciones}" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-sena">Guardar</button>
                        <a th:href="@{/registros}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
