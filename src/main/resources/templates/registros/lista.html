<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registros de Vacunaci�n</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/vacunacion.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: nav}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="text-sena">Registros de Vacunaci�n</h2>
            <a th:href="@{/registros/nuevo}" class="btn btn-sena">
                + Nuevo Registro
            </a>
        </div>

        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

        <table class="table table-striped table-hover bg-white shadow-sm">
            <thead class="table-sena">
                <tr>
                    <th>ID</th>
                    <th>Paciente</th>
                    <th>Vacuna</th>
                    <th>Fecha Vacunaci�n</th>
                    <th>Personal M�dico</th>
                    <th>Lugar</th>
                    <th>Observaciones</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${registros}">
                    <td th:text="${r.id}"></td>
                    <td th:text="${r.paciente.nombreCompleto}"></td>
                    <td th:text="${r.vacuna.nombre}"></td>
                    <td th:text="${r.fechaVacunacion}"></td>
                    <td th:text="${r.personalMedico.nombreCompleto}"></td>
                    <td th:text="${r.lugarVacunacion}"></td>
                    <td th:text="${r.observaciones}"></td>
                    <td>
                        <a th:href="@{/registros/{id}/editar(id=${r.id})}"
                           class="btn btn-sm btn-primary">Editar</a>
                        <a th:href="@{/registros/{id}/eliminar(id=${r.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('�Eliminar registro?')">Eliminar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(registros)}">
                    <td colspan="8" class="text-center text-muted">No hay registros de vacunaci�n</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
