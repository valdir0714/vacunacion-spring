<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios � Sistema de Vacunaci�n</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/vacunacion.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: nav}"></div>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="text-sena">Personal M�dico</h2>
            <a th:href="@{/usuarios/nuevo}" class="btn btn-sena">
                + Nuevo Usuario
            </a>
        </div>

        <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}"></div>

        <table class="table table-striped table-hover bg-white shadow-sm">
            <thead class="table-sena">
                <tr>
                    <th>ID</th>
                    <th>Nombre Completo</th>
                    <th>Documento</th>
                    <th>Username</th>
                    <th>Rol</th>
                    <th>Especialidad</th>
                    <th>Instituci�n</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.id}"></td>
                    <td th:text="${u.nombreCompleto}"></td>
                    <td th:text="${u.documento}"></td>
                    <td th:text="${u.username}"></td>
                    <td>
                        <span th:text="${u.rol}"
                              th:class="${u.rol.name() == 'MEDICO'} ? 'badge bg-primary' : 'badge bg-info'"></span>
                    </td>
                    <td th:text="${u.especialidad}"></td>
                    <td th:text="${u.institucion}"></td>
                    <td>
                        <a th:href="@{/usuarios/{id}/editar(id=${u.id})}"
                           class="btn btn-sm btn-primary">Editar</a>
                        <a th:href="@{/usuarios/{id}/eliminar(id=${u.id})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('�Eliminar usuario?')">Eliminar</a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="8" class="text-center text-muted">No hay usuarios registrados</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
