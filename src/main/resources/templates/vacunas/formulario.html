<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario Vacuna</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link th:href="@{/css/vacunacion.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="container mt-4">
    <div class="card shadow-md border-0" style="max-width:600px;margin:auto;">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0" th:text="${vacuna.id != null} ? #{vacunas.editar} : #{vacunas.nueva}"></h4>
        </div>
        <div class="card-body">
            <form th:action="${vacuna.id != null}
                    ? @{/vacunas/{id}(id=${vacuna.id})}
                    : @{/vacunas}"
                  th:object="${vacuna}"
                  method="post">
                <div class="mb-3">
                    <label class="form-label" th:text="#{vacunas.nombre}">Nombre</label>
                    <input type="text" th:field="*{nombre}"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{vacunas.lote}">Lote</label>
                    <input type="text" th:field="*{lote}"
                           class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label" th:text="#{vacunas.laboratorio}">Laboratorio</label>
                    <input type="text" th:field="*{laboratorio}"
                           class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label" th:text="#{vacunas.fechaVencimiento}">Fecha de Vencimiento</label>
                    <input type="date" th:field="*{fechaVencimiento}"
                           class="form-control" required>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1" th:text="#{vacunas.guardar}">Guardar</button>
                    <a th:href="@{/vacunas}" class="btn btn-outline-secondary" th:text="#{vacunas.cancelar}">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
