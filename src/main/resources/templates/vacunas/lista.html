<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{vacunas.titulo}">Vacunas - Sistema de Vacunacion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link th:href="@{/css/vacunacion.css}" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: nav}"></div>

<div class="container mt-4">
    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold mb-0" th:text="#{vacunas.titulo}">Vacunas</h2>
        <a th:href="@{/vacunas/nueva}" class="btn btn-primary" th:text="#{vacunas.nueva}">
            + Nueva Vacuna
        </a>
    </div>

    <!-- Mensaje de exito -->
    <div th:if="${mensaje}" class="alert alert-success mb-4" th:text="${mensaje}"></div>

    <!-- Tabla de vacunas -->
    <div class="card shadow-md border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>ID</th>
                    <th th:text="#{vacunas.nombre}">Nombre</th>
                    <th th:text="#{vacunas.lote}">Lote</th>
                    <th th:text="#{vacunas.laboratorio}">Laboratorio</th>
                    <th th:text="#{vacunas.fechaVencimiento}">Fecha Vencimiento</th>
                    <th th:text="#{vacunas.estado}">Estado</th>
                    <th th:text="#{vacunas.acciones}">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="vacuna : ${vacunas}">
                    <td th:text="${vacuna.id}" class="text-muted"></td>
                    <td th:text="${vacuna.nombre}" class="fw-medium"></td>
                    <td th:text="${vacuna.lote}"></td>
                    <td th:text="${vacuna.laboratorio}"></td>
                    <td th:text="${vacuna.fechaVencimiento}"></td>
                    <td>
                        <span th:if="${vacuna.estaVencida()}" class="badge bg-danger" th:text="#{vacunas.vencida}">Vencida</span>
                        <span th:unless="${vacuna.estaVencida()}" class="badge bg-success" th:text="#{vacunas.disponible}">Disponible</span>
                    </td>
                    <td>
                        <a th:href="@{/vacunas/{id}/editar(id=${vacuna.id})}"
                           class="btn btn-sm btn-primary me-1" th:text="#{general.editar}">Editar</a>
                        <a th:href="@{/vacunas/{id}/eliminar(id=${vacuna.id})}"
                           class="btn btn-sm btn-danger" th:text="#{general.eliminar}"
                           onclick="return confirm('Eliminar vacuna?')">
                            Eliminar
                        </a>
                    </td>
                </tr>
                <!-- Mensaje cuando no hay vacunas -->
                <tr th:if="${#lists.isEmpty(vacunas)}">
                    <td colspan="7" class="text-center text-muted py-4" th:text="#{vacunas.noHay}">
                        No hay vacunas registradas
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
